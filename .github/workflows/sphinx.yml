name: Sphinx
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  sphinx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache conda packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0.0.6.1.0
        env:
          # Increase this value to reset cache
          CACHE_NUMBER: 1
        with:
          path: |
            /usr/share/miniconda/pkgs/*.conda
            /usr/share/miniconda/pkgs/cache
            /home/runner/.conda/pkgs/*.conda
            /home/runner/.conda/pkgs/cache
          key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('pyproject.toml') }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.x
          architecture: x64
          cache: pip
      - name: Setup conda
        run: |
          $CONDA/bin/conda info
          # conda init doesn't do what we want here
      - name: Build Documentation
        shell: bash -l {0}
        run: |
          $CONDA/bin/conda create --quiet -n conda-index pip conda
          source $CONDA/envs/conda-index/bin/activate
          pip install -e ".[docs]"
          make html
      - name: Upload artifact
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          # Upload entire repository
          path: build/html

  pages:

    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [sphinx]

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
